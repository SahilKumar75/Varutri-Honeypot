# ===========================================
# Varutri Honeypot - Application Configuration
# ===========================================
# Sensitive values are loaded from .env file
# See .env.example for required environment variables

# Server Configuration
server.port=8080
server.servlet.context-path=/

# MongoDB Configuration (loaded from .env)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}

# LLM Provider Selection (ollama or huggingface)
llm.provider=huggingface

# Security Configuration (loaded from .env)
varutri.api-key=${VARUTRI_API_KEY}

# Ollama Configuration (if using Ollama)
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout=30

# Hugging Face Configuration (API key loaded from .env)
huggingface.api-key=${HUGGINGFACE_API_KEY}
huggingface.model=meta-llama/Llama-3.3-70B-Instruct
huggingface.phishing-model=cybersectony/phishing-email-detection-distilbert_v2.1

# Hackathon API Configuration
hackathon.callback-url=https://hackathon.guvi.in/api/updateHoneyPotFinalResult
hackathon.team-id=varutri-team

# Conversation Settings
conversation.max-turns=20

# Logging
logging.level.com.varutri.honeypot=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Session Management
varutri.session.max-turns=20
varutri.intelligence.enable-logging=true

# WhatsApp Cloud API Configuration (loaded from .env)
whatsapp.api.token=${WHATSAPP_API_TOKEN}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN}

# Government Reporting Configuration
government.report.auto-threshold=0.7
government.report.email=report@cybercrime.gov.in

# Persona Configuration
# Basic persona identity - can be changed to mimic different user types
varutri.persona.name=Rajesh Kumar
varutri.persona.age=67
varutri.persona.profession=retired school teacher
varutri.persona.city=Mumbai
varutri.persona.country=India
varutri.persona.living-status=You live alone and recently learned WhatsApp to talk with grandchildren.
varutri.persona.tech-level=You are not very tech-savvy.

# Persona personality traits (pipe-separated)
# Example: trait1|trait2|trait3
# Leave empty to use defaults
varutri.persona.personality-traits=

# Language style instructions (pipe-separated)
# Example: style1|style2|style3
# Leave empty to use defaults
varutri.persona.language-style=

# Example phrases for the persona (pipe-separated)
# Leave empty to use defaults  
varutri.persona.example-phrases=

# Common spelling mistakes (pipe-separated)
# Leave empty to use defaults
varutri.persona.common-mistakes=
